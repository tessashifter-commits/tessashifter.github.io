<!DOCTYPE html>
<html lang="eng">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tessa's Dossier</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="header" class="cyber-header"></div>

<div id="page-content" class="hidden content">
  <div class="info-bar">
    <div class="info-item">
      <span class="label">Home Reality:</span>
      <span class="value">Data Error [Cyclic redundancy check]</span>
    </div>

    <div class="info-item">
      <span class="label">Age:</span>
      <span class="value glitch-gold" data-text="Wouldn't you like to know...">Wouldn't you like to know...</span>
    </div>

    <div class="info-item">
      <span class="label">Threat Categorization:</span>
      <span class="value">Inconclusive...</span>
    </div>

    <div class="info-item">
      <span class="label">Disposition:</span>
      <span class="value">Unclear</span>
    </div>
  </div>
</div>
  
  <script>
  const header = document.getElementById("header");

  const blinkText = "ACCESSING THREAT ASSESSMENT...";
  const finalText = "THREAT DOSSIER - TESSA";

  let blinkCount = 0;
  let visible = true;

  function blink( ) {

    header.textContent = visible ? blinkText : "";

    visible = !visible;
    blinkCount++;

    if (blinkCount < 10) { 
      setTimeout(blink, 300);
    } else {
      header.textContent = "";
      typeWriter( ) ;
    }
  }

    let i = 0;

    function typeWriter() {

      if (i < finalText.length) {

        header.textContent += finalText.charAt(i);

        i++;

        setTimeout(typeWriter, 80);

      }
    }

    blink();
  </script>
</body>
</html>
