<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tessa's Dossier</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="header" class="cyber-header"></div>

<div id="page-content" class="hidden-content">
  <div class="info-bar">
    <div class="info-item">
      <span class="label">Home Reality:</span>
      <span class="value">Data Error [Cyclic redundancy check]</span>
    </div>

    <div class="info-item">
      <span class="label">Age:</span>
      <span class="value glitch-gold" data-text="Wouldn't you like to know...">Wouldn't you like to know...</span>
    </div>

    <div class="info-item">
      <span class="label">Threat Categorization:</span>
      <span class="value">Inconclusive...</span>
    </div>

    <div class="info-item">
      <span class="label">Disposition:</span>
      <span class="value">Unclear</span>
    </div>
  </div>

<div class="tab-bar">
  <button class="tab-button active" data-tab="debrief">Debriefs</button>
  <button class="tab-button" data-tab="incident-reports">Incident reports</button>
  <button class="tab-button" data-tab="form-list">Form list</button>
  <button class="tab-button" data-tab="known-associates">Known associates</button>
  <button class="tab-button" data-tab="arsenal">Arsenal</button>
</div>

<div class="tab-content">
  <section class="tab-panel active" id="debrief">
    <div id="debrief-content">Loading debriefs...</div>
  </section>

  <section class="tab-panel" id="incident-reports">
    <div id="incident-reports-content">Loading incident reports...</div>
  </section>

  <section class="tab-panel" id="form-list">
    <div class="form-list-content">Loading form list...</div>
  </section>

  <section class="tab-panel" id="known-associates">
    <div class="known-associates-content">Loading known associates...</div>
  </section>

  <section class="tab-panel" id="arsenal">
    <div class="arsenal-content">Loading arsenal...</div>
  </section>
</div>
  
</div>

  <script src="assets/js/main.js"></script>
  
</body>
</html>
